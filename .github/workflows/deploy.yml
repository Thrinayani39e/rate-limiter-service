name: Build → Push → Deploy

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/thrinayani39e/rate-limiter-app

jobs:
  # ── Job 1: build image and push to GHCR ─────────────────────────────────────
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate short SHA tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: deploy to Oracle Cloud Swarm ─────────────────────────────────────
  deploy:
    name: Deploy to Oracle Cloud Swarm
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      packages: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Oracle Cloud Swarm — rate-limiter-39e.duckdns.org',
              auto_merge: false,
              required_contexts: []
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: compose.swarm.yml
          target: /opt/rate-limiter/

      - name: Deploy stack via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e

            # Authenticate with GHCR using the read-only PAT
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u thrinayani39e --password-stdin

            # Initialise swarm if not already active
            if ! docker info --format '{{.Swarm.LocalNodeState}}' | grep -q active; then
              docker swarm init
            fi

            # Create overlay network if missing
            docker network inspect rate-limiter-net &>/dev/null || \
              docker network create --driver overlay --attachable rate-limiter-net

            # Deploy / update the stack
            IMAGE=${{ env.IMAGE }}:${{ needs.build-push.outputs.tag }} \
              docker stack deploy \
              --compose-file /opt/rate-limiter/compose.swarm.yml \
              --with-registry-auth \
              rate-limiter

            echo "Deployed ${{ env.IMAGE }}:${{ needs.build-push.outputs.tag }}"

      - name: Mark deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'success',
              environment_url: 'https://rate-limiter-39e.duckdns.org/swagger-ui/index.html',
              description: 'Deployed successfully'
            });

      - name: Mark deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Deployment failed'
            });
