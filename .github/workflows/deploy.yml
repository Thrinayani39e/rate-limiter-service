name: Build → Push → Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/thrinayani39e/rate-limiter-app

jobs:
  # ── Job 1: build image and push to GHCR ─────────────────────────────────────
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate short SHA tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: deploy to Oracle Cloud Swarm ─────────────────────────────────────
  deploy:
    name: Deploy to Oracle Cloud Swarm
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: compose.swarm.yml
          target: /opt/rate-limiter/

      - name: Deploy stack via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e

            # Authenticate with GHCR using the read-only PAT
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u thrinayani39e --password-stdin

            # Initialise swarm if not already active
            if ! docker info --format '{{.Swarm.LocalNodeState}}' | grep -q active; then
              docker swarm init
            fi

            # Create overlay network if missing
            docker network inspect rate-limiter-net &>/dev/null || \
              docker network create --driver overlay --attachable rate-limiter-net

            # Deploy / update the stack
            IMAGE=${{ env.IMAGE }}:${{ needs.build-push.outputs.tag }} \
              docker stack deploy \
              --compose-file /opt/rate-limiter/compose.swarm.yml \
              --with-registry-auth \
              rate-limiter

            echo "Deployed ${{ env.IMAGE }}:${{ needs.build-push.outputs.tag }}"
